<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdminPro - User Directory</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="loginSection" class="login-container">
        <div class="login-box">
            <h2>Admin Login</h2>
            <input type="email" id="emailInput" value="superadmin@innovatelearning.com.co" placeholder="Email">
            <input type="password" id="passwordInput" value="TSwrKwc4r7k8rRnvu6wFerN1" placeholder="Password">
            <button class="btn-primary" onclick="login()">Iniciar Sesión</button>
            <p id="loginMessage" style="color: red; font-size: 0.8rem; display: none;"></p>
        </div>
    </div>

    <div id="appSection" class="admin-container" style="display: none;">
        <aside class="sidebar">
            <div class="logo">
                <i data-lucide="layout-dashboard"></i>
                <span>AdminPro</span>
            </div>
            <nav>
                <ul>
                    <li><i data-lucide="grid"></i> Dashboard</li>
                    <li class="active"><i data-lucide="users"></i> User Directory</li>
                </ul>
            </nav>
            <div class="api-env">
                <button class="btn-secondary" onclick="logout()" style="width: 100%; margin-top: 10px;">Cerrar Sesión</button>
            </div>
        </aside>

        <main class="main-content">
            
            <div id="directoryView">
                <header class="content-header">
                    <h1>User Directory</h1>
                </header>

                <section class="search-section">
                    <div class="search-box">
                        <i data-lucide="search"></i>
                        <input type="text" id="searchInput" placeholder="Search by document number or email...">
                        <button class="btn-search" onclick="searchUser()">Search</button>
                    </div>
                </section>

                <section class="table-container">
                    <table id="userTable">
                        <thead>
                            <tr>
                                <th>USER NAME</th>
                                <th>DOCUMENT</th>
                                <th>STATUS</th>
                                <th>ACTIONS</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody">
                            </tbody>
                    </table>
                </section>
            </div>

            <div id="editorView" style="display: none;">
                <header class="content-header">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <button class="btn-secondary" onclick="closeEditor()">← Back</button>
                        <h2>User Profile Editor</h2>
                    </div>
                    <div class="header-actions">
                        <button class="btn-secondary" onclick="closeEditor()">Discard Changes</button>
                        <button class="btn-primary" onclick="saveUserChanges()">Save Changes</button>
                    </div>
                </header>

                <div class="editor-grid">
                    <div class="editor-card">
                        <h3><i data-lucide="user"></i> Personal Information</h3>
                        <div class="input-grid">
                            <div class="input-group">
                                <label>First Name</label>
                                <input type="text" id="editFirstName">
                            </div>
                            <div class="input-group">
                                <label>Last Name</label>
                                <input type="text" id="editLastName">
                            </div>
                            <div class="input-group" style="grid-column: span 2;">
                                <label>Email Address</label>
                                <input type="email" id="editEmail">
                            </div>
                        </div>
                    </div>

                    <div class="editor-card">
                        <h3><i data-lucide="briefcase"></i> Identification</h3>
                        <div class="input-grid">
                            <div class="input-group">
                                <label>Document Number</label>
                                <input type="text" id="editDocNumber">
                            </div>
                        </div>
                        <p id="updateMessage" style="margin-top: 15px; font-size: 0.9rem; display: none;"></p>
                    </div>
                </div>
            </div>

        </main>
    </div>
    <script src="app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
